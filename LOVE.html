<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你愛我嗎？</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffe4e1;
            font-family: "Microsoft JhengHei", sans-serif;
            overflow: hidden;
        }

        h1 {
            color: #ff4d6d;
            font-size: 3rem;
            margin-bottom: 20px;
            z-index: 10;
        }

        /* 階梯式蛋糕 */
        .cake {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: bounce 2s infinite ease-in-out;
            z-index: 5;
        }

        /* 蛋糕頂層 - 圓形 */
        .layer-top {
            width: 60px;
            height: 60px;
            background-color: #ff85a1;
            border-radius: 50%;
            border: 4px solid #fff;
            margin-bottom: -10px;
            z-index: 3;
        }

        /* 蛋糕中層 - 正方形(略帶圓角) */
        .layer-middle {
            width: 120px;
            height: 80px;
            background-color: #f9bec7;
            border: 4px solid #fff;
            margin-bottom: -10px;
            z-index: 2;
        }

        /* 蛋糕底層 - 正方形 */
        .layer-bottom {
            width: 200px;
            height: 100px;
            background-color: #ffb3c1;
            border: 4px solid #fff;
            z-index: 1;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* 按鈕區域 */
        .btn-container {
            margin-top: 50px;
            position: relative;
            width: 300px;
            height: 100px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
        }

        #noBtn {
            background-color: #888;
            color: white;
            position: absolute;
            left: 160px;
        }

        /* 小豬豬掉落動畫 */
        .pig {
            position: fixed;
            top: -50px;
            font-size: 30px;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 1;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <h1>你愛我嗎?</h1>

    <div class="cake">
        <div class="layer-top"></div>
        <div class="layer-middle"></div>
        <div class="layer-bottom"></div>
    </div>

    <div class="btn-container">
        <button id="yesBtn" onclick="celebrate()">Yes</button>
        <button id="noBtn" onmouseover="moveNoButton()" onclick="moveNoButton()">No</button>
    </div>

    <script>
        // 製作小豬掉落的效果
        function createPig() {
            const pig = document.createElement('div');
            pig.classList.add('pig');
            pig.innerText = '🐖'; // 小豬豬表情符號
            pig.style.left = Math.random() * 100 + 'vw';
            pig.style.animationDuration = Math.random() * 3 + 2 + 's'; // 掉落速度 2-5秒
            pig.style.opacity = Math.random();
            pig.style.fontSize = Math.random() * 20 + 20 + 'px';
            
            document.body.appendChild(pig);

            // 動畫結束後移除，避免佔用記憶體
            setTimeout(() => {
                pig.remove();
            }, 5000);
        }

        // 每 300 毫秒產生一隻小豬
        setInterval(createPig, 300);

        // "No" 按鈕逃跑邏輯
        function moveNoButton() {
            const btn = document.getElementById('noBtn');
            // 計算隨機位置，確保不會跑出視窗
            const maxX = window.innerWidth - btn.offsetWidth;
            const maxY = window.innerHeight - btn.offsetHeight;

            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;

            btn.style.position = 'fixed'; // 變成相對於視窗
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        // 點擊 "Yes" 的驚喜
        function celebrate() {
            alert("我就知道你也愛我！❤️🐖");
            location.reload(); // 重新開始
        }
    </script>
</body>
</html>
